name: Integration (openclaw)

# Smoke-tests the gateway connection (protocol negotiation, device pairing,
# and a chat round-trip) against a matrix of OpenClaw gateway versions, using a
# zero-cost local echo model so no remote provider or API key is needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  openclaw-smoke:
    name: openclaw ${{ matrix.gateway }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Sweep both gateway WS protocol versions. Each entry is the gateway
        # image tag the smoke test runs against. Keep exactly one protocol-v3
        # and one protocol-v4 pin. When bumping these:
        #   - v3 leg must stay on a protocol-v3 build. Protocol bumped to v4 at
        #     2026.5.12, so the v3 ceiling is 2026.5.11. It must ALSO support
        #     admin-scoped device pairing: the CLI only requests/grants
        #     operator.admin on `devices approve` from 2026.5.3 onward, so the
        #     usable v3 window is 2026.5.3–2026.5.7 (2026.5.7 is the newest).
        #     Older builds (e.g. 2026.4.29) fail setup with NOT_PAIRED /
        #     "missing scope: operator.admin" — see lib/openclaw-pair.sh.
        #   - v4 leg can be any current protocol-v4 release.
        gateway:
          - "2026.5.7"  # protocol v3 (newest v3 build that supports admin pairing)
          - "2026.5.28" # protocol v4
    env:
      OPENCLAW_IMAGE: ghcr.io/openclaw/openclaw:${{ matrix.gateway }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up integration env (echo model)
        run: ./test/integration/setup-openclaw-echo.sh

      - name: Connection + chat smoke test
        run: make test-integration-openclaw-smoke

      - name: Gateway logs (on failure)
        if: failure()
        run: docker compose -f test/integration/docker-compose.yml logs gateway || true

      - name: Echo model logs (on failure)
        if: failure()
        run: cat test/integration/echomodel.log || true

      - name: Teardown
        if: always()
        run: ./test/integration/teardown-openclaw.sh
