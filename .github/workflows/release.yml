name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout openclaw-go SDK
        uses: actions/checkout@v6
        with:
          repository: a3tai/openclaw-go
          path: openclaw-go

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Point go.mod replace at checked-out SDK
        run: go mod edit -replace github.com/a3tai/openclaw-go=./openclaw-go

      - name: Mint Homebrew tap token
        id: tap-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: lucinate-ai
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}
