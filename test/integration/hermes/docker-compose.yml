# Hermes integration-test compose, kept separate from the OpenClaw
# compose so the two harnesses can run independently.
#
# - Pulls the upstream Docker Hub image (nousresearch/hermes-agent).
#   Override the tag via HERMES_TAG; pinning to a specific release
#   bounds protocol drift — the CI matrix runs the oldest supported
#   tag and the current stable pin as the drift alarm.
# - Runs the `hermes dashboard` gateway (tui_gateway JSON-RPC over
#   WebSocket at /api/ws). `--insecure --host 0.0.0.0` keeps token
#   auth on a non-loopback bind (verified in the Phase 0 spike), so
#   the port publishes directly — no socat sidecar.
# - Maps host port 19119 → container 9119 to avoid clashing with a
#   developer's locally-running Hermes dashboard on the default port.
# - Mounts ./state as /opt/data so the seeded config.yaml drives the
#   container and teardown can wipe state cleanly.
# - Inference routes to the host (echomodel stub or Ollama) via
#   host.docker.internal — the seed config (state/config.yaml,
#   written by setup-hermes.sh) points provider "custom" at it.
services:
  hermes:
    image: nousresearch/hermes-agent:${HERMES_TAG:-v2026.7.7.2}
    command:
      [
        "dashboard",
        "--host",
        "0.0.0.0",
        "--port",
        "9119",
        "--no-open",
        "--skip-build",
        "--insecure",
      ]
    ports:
      - "19119:9119"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./state:/opt/data
    environment:
      HERMES_DASHBOARD_SESSION_TOKEN: "lucinate"
    # No in-container healthcheck: the upstream image doesn't ship
    # curl/wget, so setup-hermes.sh polls the published port instead.
